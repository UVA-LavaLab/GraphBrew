# GraphBrew Sniper base configuration.
#
# Keep the GraphBrew paper-run topology here instead of editing upstream Sniper
# configs in-place. roi_matrix.py may still override cache sizes, associativity,
# replacement policy, core count, and address-domain per row for sweeps.

# Base simulator/MimicOS configuration. This is the same GraphBrew-compatible
# stack as address_translation_schemes/baseline, with GraphBrew-specific cache
# topology and safe allocator defaults layered below.
#include ./common_configs/base_system_sniperspace.cfg
#include ./core_configs/meteor_lake_pcore.cfg
#include ./mmu_configs/mmu_base.cfg
#include ./pagetable_configs/4_level_radix.cfg
#include ./pagetable_configs/range_table.cfg
#include ./dram_configs/ddr4_2400.cfg
#include ./physical_memory_allocators/reserve_thp.cfg
#include ./graphbrew/graph_cache_config.cfg

[general]
total_cores = 1
native_environment = "true"
virtualized_environment = "false"
enable_virtualized_system = false
translation_enabled = "false"
enable_icache_modeling = false
enable_userspace_mimicos = false
exception_handler_type = "default"

[perf_model/reserve_thp]
memory_size = 4096
kernel_size = 128
target_fragmentation = 0.0
max_order = 12
frag_type = "largepage"
threshold_for_promotion = 0.0
fragmentation_mode = "ratio"
target_free_2mb_pages = 0

# In-order timing to match gem5 TimingSimpleCPU + cache_sim (program-order
# memory accesses; rob/OoO desyncs POPT's vertex order) and run faster at scale.
[perf_model/core]
type = interval

# Disable the periodic barrier clock-skew scheme. Its client/server
# (barrier_sync_client/barrier_sync_server) is the source of BOTH the multicore
# OpenMP deadlock and an intermittent SIGSEGV under our threaded workload. Cache
# miss rate — the metric — is capacity/reuse dominated and is unchanged by the
# scheme (validated: scheme=none matches barrier within noise, e.g. cit-Patents
# PR c4 LRU 0.2968 vs 0.2970, CC c4 ECG:DBG 0.6316 vs ~0.629). Single-core runs
# never used the barrier; multicore runs no longer crash.
[clock_skew_minimization]
scheme = none
