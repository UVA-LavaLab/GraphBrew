# GraphBrew Sniper cache/topology configuration.
#
# This file is included by graph_sniper.cfg after Sniper's stock core config so
# it becomes the single tracked source for GraphBrew's default cache hierarchy.
# roi_matrix.py overrides the sweep axes per run.

[perf_model/cache]
levels = 2
mshr_size = 80

[perf_model/l1_icache]
perfect = false
passthrough = false
coherent = true
cache_block_size = 64
cache_size = 32
associativity = 8
address_hash = "xor_mod"
replacement_policy = lru
data_access_time = 3
tags_access_time = 1
perf_model_type = parallel
writeback_time = 0
shared_cores = 1
prefetcher = "none"

[perf_model/l1_dcache]
perfect = false
passthrough = false
cache_block_size = 64
cache_size = 1
associativity = 8
address_hash = "xor_mod"
replacement_policy = lru
data_access_time = 3
tags_access_time = 1
perf_model_type = parallel
writethrough = 0
writeback_time = 0
shared_cores = 1
outstanding_misses = 50
prefetcher = "none"

[perf_model/l1_dcache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l2_cache]
perfect = false
passthrough = false
cache_block_size = 64
cache_size = 2
associativity = 4
address_hash = "xor_mod"
replacement_policy = lru
data_access_time = 9
tags_access_time = 3
perf_model_type = parallel
writethrough = 0
writeback_time = 0
shared_cores = 1
prefetcher = "none"

[perf_model/l2_cache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l2_cache/srrip]
bits = 3
tlb_enabled = false

[perf_model/l2_cache/qbs]
attempts = 6

[perf_model/nuca]
enabled = "true"
address_hash = "xor_mod"
cache_size = 32
associativity = 16
replacement_policy = lru
tags_access_time = 15
data_access_time = 20
bandwidth = 128

[perf_model/nuca/cache/srrip]
bits = 3
tlb_enabled = false

[perf_model/nuca/cache/qbs]
attempts = 4

[perf_model/nuca/queue_model]
enabled = true
type = history_list

[perf_model/nuca/mplru]
mode = disabled
mpki_threshold = 10.0

[perf_model/metadata]
shadow_cache_enabled = "false"
shadow_cache_size = 16
shadow_cache_associativity = 8
shadow_cache_hit_latency = 1
shadow_cache_miss_latency = 2
passthrough_loc = 2
